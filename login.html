<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack Pro - Login</title>
    <link rel="stylesheet" href="style.css">
    <base href="./">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i class="fas fa-dumbbell"></i>
                    FitTrack Pro
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your fitness journey</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i>
                    <div>Demo: Use john@fitness.com / password123</div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" value="john@fitness.com" required>
                    <div class="form-error">Please enter a valid email address</div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" value="password123" required>
                    <div class="form-error">Password must be at least 6 characters</div>
                </div>

                <div class="form-group">
                    <div class="alert" id="formAlert" style="display: none;"></div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>

                <div class="text-center mt-3">
                    <a href="#" id="forgotPassword" class="auth-link">Forgot Password?</a>
                </div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="auth-link">Create one here</a></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="login.js"></script>
</body>
</html>
